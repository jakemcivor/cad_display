<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactable 3D CAD MVP</title>

    <link rel="stylesheet" href="style.css">

    <script
        type="module"
        src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>
    <script 
        src="script.js">
    </script>
</head>
<body>

    <header>
        <h1>Interactable 3D CAD MVP</h1>
        <p>Interactive 3D Model</p>
    </header>

    <main>

        <section class="viewer-card">

            <div class="toolbar">
                <button data-view="iso">ISO</button>
                <button data-view="top">Top</button>
                <button data-view="front">Front</button>
                <button data-view="left">Left</button>
                <button id="resetBtn">Reset</button>
            </div>

            <model-viewer
                id="viewer"
                src="assets/models/Forest-PCB.glb"
                alt="3D Model"
                camera-controls
                interaction-prompt="none"
                camera-orbit="45deg 60deg 120%"
                field-of-view="30deg"
                environment-image="neutral"
                shadow-intensity="1"
                exposure="0.8">
            </model-viewer>

        </section>
    </main>

    
</body>
</html>
